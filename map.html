<!DOCTYPE html>
<html>
<head>
  <title>...</title>
  <meta charset="utf-8">
  <style>
body {
  background-color: #FFFFFF;
  color: #571212;
  font-family: Verdana, Arial, Sans-Serif;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 100px;
}

.container {
  max-width: 900px;
  margin: 1in auto;
  padding: 0 20px;
}

#map {
  width: 100%;
  height: 500px;
  margin-top: 20px;
  border: 2px solid #ccc;
  border-radius: 10px;
}
  </style>
  
</head>
<body>

<h3><center>OCCURENCE MAP</center></h3>
<p><center><a href=portal.html>back</a></center></p>
<p><center>*NOTICE: Map update schedule moved to Tuesdays 17:00 starting March 2026.</center></p>
<div id="map"></div>

<script>
  function initMap() {
    // Center map (Manila)
    const center = { lat: 14.5995, lng: 120.9842 };

    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: center,
    });

    // Locations array
  const locations = [
    {
      position: { lat: 14.550548096573538, lng: 120.98193884816897},
      title: "Manila Film Center",
      description: "view file",
      url: "https://example.com/manila"
    },
    {
      position: { lat: 14.6760, lng: 121.0437 },
      title: "Quezon City",
      url: "https://example.com/qc"
    }
  ];

    // Add markers
    locations.forEach(loc => {
    const marker = new google.maps.Marker({
      position: loc.position,
      map: map,
      title: loc.title,
    });

    const infoWindow = new google.maps.InfoWindow({
    content: `
      <div style="max-width:200px">
        <h3>${loc.title}</h3>
        <h4 style="margin:0;">
        <a href="${loc.url}" target="_blank">
          ${loc.description}
        </a>
        </h4>
      </div>
    `
    });
      
      const bounds = new 		google.maps.LatLngBounds();
locations.forEach(loc => bounds.extend(loc.position));
map.fitBounds(bounds);

      marker.addListener("click", () => {
        infoWindow.open(map, marker);
      });
    });
  }
</script>

<!-- Replace YOUR_API_KEY with your actual key -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLATsQ7gW_PBugZW_PgVqsEDvOZwEcNkI&callback=initMap">
</script>

</body>
</html>
